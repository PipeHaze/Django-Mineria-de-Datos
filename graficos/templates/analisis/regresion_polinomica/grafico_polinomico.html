<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regresión Polinómica por Región</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body class="bg-light">
    <div class="container my-4">
        <h1 class="text-center mb-4">📈 Regresión Polinómica de Homicidios y Tasa</h1>

        <form method="get" action="" class="row g-3 align-items-center mb-4">
            <div class="col-md-5">
                <label for="region_index" class="form-label"><strong>Selecciona regiones:</strong></label>
                <select name="region_index" id="region_index" multiple size="8" class="form-select">
                    {% for i, nombre in regiones %}
                        <option value="{{ i }}" {% if i in regiones_seleccionadas %}selected{% endif %}>
                            {{ nombre }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <label for="variable" class="form-label"><strong>Variable:</strong></label> <!--aqui sacamos la variable llamada variable en el view XD--->>
                <select name="variable" id="variable" class="form-select">
                    <option value="Homicidios" {% if variable_seleccionada == "Homicidios" %}selected{% endif %}>Homicidios</option>
                    <option value="Tasa" {% if variable_seleccionada == "Tasa" %}selected{% endif %}>Tasa</option>
                </select>
            </div>

            <div class="col-md-2">
                <label for="grado" class="form-label"><strong>Grado:</strong></label>
                <select name="grado" id="grado" class="form-select">
                    <option value="2" {% if grado == 2 %}selected{% endif %}>2</option>
                    <option value="3" {% if grado == 3 %}selected{% endif %}>3</option>
                    <option value="4" {% if grado == 4 %}selected{% endif %}>4</option>
                </select>
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">Actualizar</button>
            </div>
        </form>

        <div id="grafico" class="border rounded bg-white p-3 shadow-sm">
            {{ grafico_html|safe }}
        </div>
    </div>
</body>
</html>
