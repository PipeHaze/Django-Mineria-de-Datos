<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graficos</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/eb496ab1a0.js" crossorigin="anonymous"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container my-4">
    <h1 class="mb-4">Gráfico Interactivo de Regiones</h1>

    <form method="get" class="row g-3 align-items-center mb-4">
        <div class="col-auto">
            <label for="region_index" class="col-form-label">Selecciona Región:</label>
        </div>
        <div class="col-auto">
            <select name="region_index" id="region_index" class="form-select" multiple size="6">
                {% for index, nombre in regiones %}
                    <option value="{{ index }}"
                {% if index in regiones_seleccionadas %}selected{% endif %}>
                {{ nombre }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="col-auto">
            <label for="variable" class="col-form-label">Variable:</label>
        </div>
        <div class="col-auto">
            <select name="variable" id="variable" class="form-select">
                <option value="Homicidios" {% if variable_seleccionada == 'Homicidios' %}selected{% endif %}>Homicidios</option>
                <option value="Tasa" {% if variable_seleccionada == 'Tasa' %}selected{% endif %}>Tasa</option>
            </select>
        </div>

        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Actualizar</button>
        </div>
    </form>

    <div class="row mb-4">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Exportar Datos</h5>
                <form method="get" action="{% url 'graficos:grafico_simple' %}" target="_blank" id="form_pdf">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-file-pdf"></i> Descargar PDF
                    </button>
                </form>
                <!-- Mostrar regiones seleccionadas (opcional) -->
                {% if regiones_seleccionadas %}
                <div class="mt-2 text-muted small">
                    Regiones seleccionadas: {{ regiones_seleccionadas|length }}
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

    

    <div>
        {{ grafico_html|safe }}
    </div>
</div>

<script>
document.getElementById("form_pdf").addEventListener("submit", function(){

    let select = document.getElementById("region_index");
    let form = this;

    // limpiar inputs anteriores
    form.querySelectorAll("input[name='region_index']").forEach(e => e.remove());

    // agregar regiones seleccionadas
    Array.from(select.options).forEach(option => {
        if(option.selected){
            let input = document.createElement("input");
            input.type = "hidden";
            input.name = "region_index";
            input.value = option.value;
            form.appendChild(input);
        }
    });

});
</script>
</body>
</html>
