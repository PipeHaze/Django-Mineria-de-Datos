<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/eb496ab1a0.js" crossorigin="anonymous"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container my-4">
        <h1>📊 Comparación de Regresiones por Región</h1>

    <form method="get" action="" class="row g-3 align-items-center mb-4">
        <!-- Selector múltiple de regiones -->
        <label for="region_index" class="col-form-label"><strong>Selecciona una o varias regiones:</strong></label><br>
        <select name="region_index" id="region_index" multiple size="8" class="form-select">
            {% for i, nombre in regiones %}
                <option value="{{ i }}" 
                    {% if i in regiones_seleccionadas %}selected{% endif %}>
                    {{ nombre }}
                </option>
            {% endfor %}
        </select>
        <br>

        <!-- Selector de variable -->
        <label for="variable"><strong>Variable:</strong></label>
        <select name="variable" id="variable">
            <option value="Homicidios" {% if variable_seleccionada == "Homicidios" %}selected{% endif %}>Homicidios</option>
            <option value="Tasa" {% if variable_seleccionada == "Tasa" %}selected{% endif %}>Tasa</option>
        </select>

        <br><br>
        <button type="submit" class="btn btn-primary">Actualizar</button>
        <p style="font-size: 13px; color: #555;">(Mantén presionado Ctrl o Shift para seleccionar varias regiones)</p>
    </form>
    </div>
    

    <!-- Contenedor del gráfico -->
    <div id="grafico">
        {{ grafico_html|safe }}
    </div>

    <script>
        $(document).ready(function() {
            // Cuando cambia cualquier selector o se envía el formulario
            $('#form-filtros').on('submit', function(e) {
                e.preventDefault();
                actualizarGrafico();
            });

            $('#region_index, #variable').on('change', function() {
                actualizarGrafico();
            });

            function actualizarGrafico() {
                $('#loading').show();
                $('#grafico').html('');

                const regiones = $('#region_index').val();
                const variable = $('#variable').val();

                $.ajax({
                    url: "{% url 'grafico_comparativo' %}",
                    data: {
                        'region_index': regiones,
                        'variable': variable
                    },
                    success: function(data) {
                        const html = $(data).find('#grafico').html();
                        $('#grafico').html(html);
                        $('#loading').hide();
                    },
                    error: function() {
                        $('#grafico').html('<p style="color:red; text-align:center;">❌ Error al cargar el gráfico.</p>');
                        $('#loading').hide();
                    }
                });
            }
        });
    </script>

</body>
</html>
